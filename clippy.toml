# Clippy thresholds. Lint levels (clippy::all / pedantic) live in the workspace
# Cargo.toml under [workspace.lints]; this file holds configurable thresholds.
too-many-arguments-threshold = 8

# Proper nouns with embedded capitals that the doc_markdown lint would otherwise
# flag as un-backticked identifiers. `..` keeps clippy's default list.
doc-valid-idents = ["WebSocket", "PnL", "ratatui", "OHLCV", ".."]
