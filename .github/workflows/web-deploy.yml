name: Deploy web

# Build the browser renderer (WASM + Vue) and deploy it to Cloudflare Pages.
#
# The build runs on every push to main that touches the web renderer, the WASM
# binding or the core; the deploy step only runs when the CLOUDFLARE_API_TOKEN
# secret is configured, so the workflow is green (build-only) until the Pages
# project + secrets are set up. That setup and the live deploy are USER-GO.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "bindings/wasm/**"
      - "crates/terminal-core/**"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build + deploy the web renderer
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # Exposed to step-level `if:` so the deploy is skipped (not failed) when the
    # secret is absent. Cloudflare needs both an API token and the account id.
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install wasm-pack
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: wasm-pack

      - name: Build the WASM package
        run: wasm-pack build bindings/wasm --target web --release

      - name: Build the web renderer
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=wickra-terminal

      - name: Note when the deploy is skipped
        if: ${{ env.CF_API_TOKEN == '' }}
        run: echo "::notice::built web/dist; skipping deploy (CLOUDFLARE_API_TOKEN not set)"
