# cargo-deny configuration — supply-chain gate (advisories, licenses, bans, sources).

[advisories]
version = 2
yanked = "deny"
# Suppressed advisories (assessed as not affecting wickra-terminal). Keep in
# lock-step with osv-scanner.toml.
ignore = [
    # paste — unmaintained (not a vulnerability). A build-time proc-macro helper
    # pulled transitively by ratatui (the TUI renderer); ratatui has not yet
    # migrated off it. No runtime code path, no known security impact.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93

# Scoped license exceptions for individual permissive / public-domain crates:
#   - webpki-roots (CDLA-Permissive-2.0): the Mozilla CA certificate bundle as
#     data, pulled in transitively by the exchange's rustls TLS stack.
exceptions = [
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# The exchange and backtester are consumed as git dependencies until their first
# crates.io release; both live under the project's own GitHub org.
[sources.allow-org]
github = ["wickra-lib"]
