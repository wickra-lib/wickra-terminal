language = "C"
header = "/* wickra-terminal C ABI — generated by cbindgen. Do not edit by hand. */"
include_guard = "WICKRA_TERMINAL_H"
pragma_once = true
# Wrap declarations in extern "C" under __cplusplus so the header is usable from
# C++ directly.
cpp_compat = true
tab_width = 4
documentation = true
style = "type"

[fn]
sort_by = "None"

[parse]
# Only this crate defines the ABI; the wrapped terminal type is opaque and never
# crosses the boundary by value, so there is no need to parse dependencies.
parse_deps = false
